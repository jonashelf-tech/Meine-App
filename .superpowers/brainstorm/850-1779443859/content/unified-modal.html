<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: rgba(255,255,255,0.92); font-family: 'Outfit', sans-serif; padding: 16px; }

  h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }

  .modal-frame {
    background: #0c0c1a;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
    overflow: hidden;
    max-width: 420px;
    margin: 0 auto 24px;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-title { font-size: 0.95rem; font-weight: 700; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.35); font-size: 1rem; cursor: pointer; padding: 4px 8px; }

  .type-row {
    display: flex;
    gap: 5px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .type-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .type-btn.active-todo   { background: rgba(0,207,255,0.15); border-color: rgba(0,207,255,0.4); color: #00CFFF; }
  .type-btn.active-termin { background: rgba(255,45,120,0.15); border-color: rgba(255,45,120,0.4); color: #FF2D78; }
  .type-btn.active-routine{ background: rgba(191,0,255,0.15); border-color: rgba(191,0,255,0.4); color: #BF00FF; }
  .type-btn.active-vorlage{ background: rgba(0,255,148,0.15); border-color: rgba(0,255,148,0.4); color: #00FF94; }

  .text-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .text-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: rgba(255,255,255,0.9);
    font-size: 0.88rem;
    font-family: inherit;
    padding: 8px 12px;
    outline: none;
  }
  .auto-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 0.78rem;
    font-family: inherit;
    padding: 8px 12px;
    cursor: pointer;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .field-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    width: 52px;
    flex-shrink: 0;
  }
  .seg-control { display: flex; gap: 4px; }
  .seg-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 0.73rem;
    font-family: inherit;
    padding: 4px 9px;
    cursor: pointer;
  }
  .seg-btn.active { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #8B5CF6; }

  /* Duration row — NEW design */
  .dur-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .dur-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.45);
    font-size: 0.73rem;
    font-family: inherit;
    padding: 4px 8px;
    cursor: pointer;
  }
  .dur-btn.active { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #8B5CF6; }
  .dur-input {
    width: 52px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    font-family: inherit;
    padding: 4px 7px;
    text-align: center;
  }
  .dur-unit { font-size: 0.7rem; color: rgba(255,255,255,0.3); }

  .termin-block {
    display: flex;
    gap: 8px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .termin-field { flex: 1; }
  .termin-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.3); margin-bottom: 4px; display: block; }
  .termin-input {
    width: 100%;
    background: rgba(255,45,120,0.08);
    border: 1px solid rgba(255,45,120,0.3);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.82rem;
    font-family: inherit;
    padding: 6px 10px;
  }

  .submit-btn {
    width: calc(100% - 28px);
    margin: 12px 14px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: block;
  }
  .submit-todo    { background: rgba(0,207,255,0.2); color: #00CFFF; }
  .submit-termin  { background: rgba(255,45,120,0.2); color: #FF2D78; }

  .edit-hint {
    display: inline-block;
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 6px;
    font-size: 0.68rem;
    color: #8B5CF6;
    padding: 2px 8px;
    margin-left: 8px;
    font-weight: 600;
  }
</style>

<h2>A1 — Einheitliches Modal</h2>
<p class="subtitle">Links: Erstellen. Rechts: Bearbeiten (selbe Komponente, Typ wechselbar).</p>

<div class="split">
  <!-- ERSTELLEN -->
  <div class="mockup">
    <div class="mockup-header">Hinzufügen</div>
    <div class="mockup-body" style="padding:0">
      <div class="modal-frame" style="border-radius:12px">
        <div class="modal-header">
          <span class="modal-title">Hinzufügen</span>
          <button class="modal-close">✕</button>
        </div>
        <div class="type-row">
          <button class="type-btn active-todo">Todo</button>
          <button class="type-btn">Termin</button>
          <button class="type-btn">Routine</button>
          <button class="type-btn">Vorlage</button>
        </div>
        <div class="text-row">
          <input class="text-input" placeholder="Was muss getan werden…" />
          <button class="auto-btn">Auto</button>
        </div>
        <div class="field-row">
          <span class="field-label">Prio</span>
          <div class="seg-control">
            <button class="seg-btn">! Wichtig</button>
            <button class="seg-btn">· Sollte</button>
            <button class="seg-btn active">Kann</button>
          </div>
        </div>
        <div class="field-row">
          <span class="field-label">Dauer</span>
          <div class="dur-row">
            <button class="dur-btn">5</button>
            <button class="dur-btn">10</button>
            <button class="dur-btn active">15</button>
            <button class="dur-btn">30</button>
            <button class="dur-btn">60</button>
            <button class="dur-btn">90</button>
            <button class="dur-btn">2h</button>
            <input class="dur-input" placeholder="—" />
            <span class="dur-unit">min</span>
          </div>
        </div>
        <button class="submit-btn submit-todo">Todo hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- BEARBEITEN -->
  <div class="mockup">
    <div class="mockup-header">Bearbeiten (Termin)</div>
    <div class="mockup-body" style="padding:0">
      <div class="modal-frame" style="border-radius:12px">
        <div class="modal-header">
          <span class="modal-title">Bearbeiten <span class="edit-hint">Typ wechselbar</span></span>
          <button class="modal-close">✕</button>
        </div>
        <div class="type-row">
          <button class="type-btn">Todo</button>
          <button class="type-btn active-termin">Termin</button>
          <button class="type-btn">Routine</button>
          <button class="type-btn">Vorlage</button>
        </div>
        <div class="text-row">
          <input class="text-input" value="Zahnarzt" />
          <button class="auto-btn">Auto</button>
        </div>
        <div class="termin-block">
          <div class="termin-field">
            <span class="termin-label">Datum</span>
            <input class="termin-input" value="2025-05-28" type="date" />
          </div>
          <div class="termin-field">
            <span class="termin-label">Uhrzeit</span>
            <input class="termin-input" value="10:30" type="time" />
          </div>
        </div>
        <div class="field-row">
          <span class="field-label">Dauer</span>
          <div class="dur-row">
            <button class="dur-btn">5</button>
            <button class="dur-btn">10</button>
            <button class="dur-btn">15</button>
            <button class="dur-btn active">30</button>
            <button class="dur-btn">60</button>
            <button class="dur-btn">90</button>
            <button class="dur-btn">2h</button>
            <input class="dur-input" placeholder="—" />
            <span class="dur-unit">min</span>
          </div>
        </div>
        <button class="submit-btn submit-termin">Speichern</button>
      </div>
    </div>
  </div>
</div>

<p class="subtitle" style="margin-top:16px;text-align:center">Passt das Grundlayout? Oder soll etwas anders strukturiert sein?</p>
