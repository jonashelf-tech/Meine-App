<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: rgba(255,255,255,0.92); font-family: 'Outfit', sans-serif; padding: 16px; }
  h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }

  .modal-frame {
    background: #0c0c1a;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    overflow: hidden;
    max-width: 400px;
    margin: 0 auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-title { font-size: 0.95rem; font-weight: 700; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 1rem; cursor: pointer; }

  .type-row { display: flex; gap: 5px; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .type-btn {
    flex: 1; padding: 5px 0; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.4);
    font-size: 0.72rem; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .type-btn.active-todo   { background: rgba(0,207,255,0.15); border-color: rgba(0,207,255,0.4); color: #00CFFF; }
  .type-btn.active-termin { background: rgba(255,45,120,0.15); border-color: rgba(255,45,120,0.4); color: #FF2D78; }

  .text-row {
    display: flex; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .text-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: rgba(255,255,255,0.9); font-size: 0.88rem;
    font-family: inherit; padding: 8px 12px; outline: none;
  }
  .auto-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: rgba(255,255,255,0.5); font-size: 0.78rem;
    font-family: inherit; padding: 8px 12px; cursor: pointer;
  }

  .field-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .field-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    width: 56px; flex-shrink: 0;
  }
  .seg-control { display: flex; gap: 4px; }
  .seg-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 0.72rem;
    font-family: inherit; padding: 4px 8px; cursor: pointer;
  }
  .seg-btn.active { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #8B5CF6; }

  .dur-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .dur-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 0.72rem;
    font-family: inherit; padding: 4px 7px; cursor: pointer;
  }
  .dur-btn.active { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #8B5CF6; }
  .dur-input {
    width: 46px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 0.72rem;
    font-family: inherit; padding: 4px 6px; text-align: center;
  }
  .dur-unit { font-size: 0.68rem; color: rgba(255,255,255,0.25); }

  /* Color circles */
  .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    border: 2px solid transparent;
  }
  .color-dot.active { border-color: white; box-shadow: 0 0 0 1px rgba(255,255,255,0.4); }

  /* Category input */
  .cat-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: rgba(255,255,255,0.7); font-size: 0.82rem;
    font-family: inherit; padding: 5px 10px;
  }
  .cat-optional { font-size: 0.62rem; color: rgba(255,255,255,0.25); margin-left: 4px; font-weight: 400; }

  .termin-block {
    display: flex; gap: 8px; padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .termin-field { flex: 1; }
  .termin-label { font-size: 0.63rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.3); margin-bottom: 4px; display: block; }
  .termin-input {
    width: 100%; background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.3);
    border-radius: 8px; color: rgba(255,255,255,0.7); font-size: 0.82rem;
    font-family: inherit; padding: 5px 9px;
  }

  .submit-btn {
    display: block; width: calc(100% - 28px); margin: 11px 14px;
    padding: 11px; border-radius: 12px; border: none; font-size: 0.88rem;
    font-weight: 700; font-family: inherit; cursor: pointer;
  }
  .submit-todo   { background: rgba(0,207,255,0.2); color: #00CFFF; }
  .submit-termin { background: rgba(255,45,120,0.2); color: #FF2D78; }

  .divider { height: 1px; background: rgba(255,255,255,0.04); margin: 0; }
</style>
