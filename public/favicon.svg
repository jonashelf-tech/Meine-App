<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="corner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <clipPath id="shape">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="110" fill="#04030b"/>
  <g clip-path="url(#shape)">
    <!-- subtle glow at origin corner -->
    <circle cx="0" cy="0" r="120" fill="#4a20a0" filter="url(#corner-glow)" opacity="0.5"/>
    <!-- rings from top-left corner, bright inner → dark outer -->
    <circle cx="0" cy="0" r="102" stroke="#7c38e0" stroke-width="14" fill="none"/>
    <circle cx="0" cy="0" r="204" stroke="#5424b0" stroke-width="12" fill="none"/>
    <circle cx="0" cy="0" r="316" stroke="#361478" stroke-width="10" fill="none"/>
    <circle cx="0" cy="0" r="418" stroke="#200c4e" stroke-width="9"  fill="none"/>
    <circle cx="0" cy="0" r="510" stroke="#110628" stroke-width="8"  fill="none"/>
  </g>
</svg>
